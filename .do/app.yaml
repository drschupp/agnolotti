name: agnolotti
region: nyc

ingress:
  rules:
    - component:
        name: api
      match:
        path:
          prefix: /api
    - component:
        name: dashboard
      match:
        path:
          prefix: /

services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: drschupp/agnolotti
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AGNO_TELEMETRY
        scope: RUN_TIME
        value: "false"
      - key: DB_HOST
        scope: RUN_TIME
        value: ${db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${db.USERNAME}
      - key: DB_PASS
        scope: RUN_TIME
        value: ${db.PASSWORD}
      - key: DB_DATABASE
        scope: RUN_TIME
        value: ${db.DATABASE}
      - key: DB_DRIVER
        scope: RUN_TIME
        value: "postgresql+psycopg"

  - name: dashboard
    dockerfile_path: Dockerfile.dashboard
    github:
      repo: drschupp/agnolotti
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
